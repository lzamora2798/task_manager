service: task-manager-api
frameworkVersion: "3"
useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  environment:
    DB_HOST: ${env:DB_HOST}
    DB_PORT: ${env:DB_PORT, "3306"}
    DB_USER: ${env:DB_USER}
    DB_PASS: ${env:DB_PASS}
    DB_NAME: ${env:DB_NAME}
    JWT_SECRET: ${env:JWT_SECRET}
    NODE_ENV: ${env:NODE_ENV, "production"}

functions:
  api:
    handler: src/lambda.handler
    events:
      - httpApi: '*'

plugins:
  - serverless-dotenv-plugin
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    platform: node
    target: node20
    sourcemap: true
    tsconfig: tsconfig.build.json
    keepNames: true
    minify: false
    treeShaking: false
    exclude:
      - aws-sdk
    external:
      - "@nestjs/microservices"
      - "@nestjs/microservices/microservices-module"
      - "@nestjs/websockets"
      - "@nestjs/websockets/socket-module"